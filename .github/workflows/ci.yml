name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Det rene domæne testes på macOS-værten (hurtigt, ingen simulator).
  core-tests:
    name: StjernelobCore unit-tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift test
        working-directory: StjernelobCore
        run: swift test --enable-code-coverage

  # Rapporterer formaterings-afvigelser (ikke-blokerende, indtil koden er kørt
  # gennem swiftformat på en Mac — den kan ikke køre på Windows-udviklingsmaskinen).
  format-lint:
    name: SwiftFormat (rapport)
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Installer SwiftFormat
        run: brew install swiftformat
      - name: Lint
        run: swiftformat --lint .

  # iOS-appen genereres med XcodeGen og bygges for iOS-simulator.
  ios-build:
    name: Byg iOS-app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Installer XcodeGen
        run: brew install xcodegen
      - name: Generér Xcode-projekt
        working-directory: App
        run: xcodegen generate
      - name: Byg (iOS Simulator)
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild build \
            -project Stjernelob.xcodeproj \
            -scheme Stjernelob \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  # App-lagets unit-tests køres på iOS-simulator.
  app-tests:
    name: App-tests (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Installer XcodeGen
        run: brew install xcodegen
      - name: Generér Xcode-projekt
        working-directory: App
        run: xcodegen generate
      - name: Test (iOS Simulator)
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild test \
            -project Stjernelob.xcodeproj \
            -scheme Stjernelob \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO

  # watchOS-ledsageren bygges for watchOS-simulator.
  watch-build:
    name: Byg watchOS-ledsager
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Installer XcodeGen
        run: brew install xcodegen
      - name: Generér Xcode-projekt
        working-directory: App
        run: xcodegen generate
      - name: Byg (watchOS Simulator)
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild build \
            -project Stjernelob.xcodeproj \
            -scheme StjernelobWatch \
            -destination 'generic/platform=watchOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
