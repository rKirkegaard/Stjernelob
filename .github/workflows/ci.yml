name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Det rene domæne testes på macOS-værten (hurtigt, ingen simulator).
  core-tests:
    name: StjernelobCore unit-tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift test
        working-directory: StjernelobCore
        run: swift test --enable-code-coverage

  # Håndhæver kodeformatering efter .swiftformat (koden er kørt gennem
  # swiftformat 0.61). Blokerende — formateringen skal holdes ved lige.
  format-lint:
    name: SwiftFormat
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Installer SwiftFormat
        run: brew install swiftformat
      - name: Lint
        run: swiftformat --lint .

  # iOS-appen genereres med XcodeGen og bygges for iOS-simulator.
  ios-build:
    name: Byg iOS-app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Installer XcodeGen
        run: brew install xcodegen
      - name: Generér Xcode-projekt
        working-directory: App
        run: xcodegen generate
      - name: Byg (iOS Simulator)
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild build \
            -project Stjernelob.xcodeproj \
            -scheme Stjernelob \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  # App-lagets unit-tests køres på iOS-simulator.
  app-tests:
    name: App-tests (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Installer XcodeGen
        run: brew install xcodegen
      - name: Generér Xcode-projekt
        working-directory: App
        run: xcodegen generate
      - name: Test (iOS Simulator)
        working-directory: App
        run: |
          set -o pipefail
          # Find en tilgængelig iPhone-simulator dynamisk (navne varierer pr. runner-image).
          DEVICE_ID=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone[^(]*\(([0-9A-F-]{36})\)' | grep -oE '[0-9A-F-]{36}')
          echo "Bruger simulator: $DEVICE_ID"
          # Ingen CODE_SIGNING_ALLOWED=NO her: UI-testen launcher appen som en
          # selvstændig proces, og en usigneret app med iCloud/App Group-
          # entitlements kan ikke launches. Lad xcodebuild ad-hoc-signere til
          # simulatoren i stedet (kræver ikke team/profil).
          # UI-testens app-launch er lejlighedsvis flaky på CI-simulatoren
          # ("Failed to get background assertion"). Genprøv en fejlet test et par
          # gange, så et enkelt flaky launch ikke fælder hele kørslen.
          xcodebuild test \
            -project Stjernelob.xcodeproj \
            -scheme Stjernelob \
            -destination "id=$DEVICE_ID" \
            -retry-tests-on-failure \
            -test-iterations 3

  # watchOS-ledsageren bygges for watchOS-simulator.
  watch-build:
    name: Byg watchOS-ledsager
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Installer XcodeGen
        run: brew install xcodegen
      - name: Generér Xcode-projekt
        working-directory: App
        run: xcodegen generate
      - name: Byg (watchOS Simulator)
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild build \
            -project Stjernelob.xcodeproj \
            -scheme StjernelobWatch \
            -destination 'generic/platform=watchOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
