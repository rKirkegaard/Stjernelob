# XcodeGen-definition af Stjerneløb. Selve .xcodeproj genereres herfra (på CI
# eller en Mac med `xcodegen generate`) — så projektet kan redigeres som tekst
# fra Windows og bygges på macOS.
name: Stjernelob

options:
  bundleIdPrefix: com.rkirkegaard.stjernelob
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: da

packages:
  StjernelobCore:
    path: ../StjernelobCore

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Hæves til "complete" senere; holdes på standard under opbygningen.
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Stjernelob:
    type: application
    platform: iOS
    sources:
      - path: Stjernelob
    dependencies:
      - package: StjernelobCore
      - target: StjernelobShared
        embed: true
      - target: StjernelobWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Stjerneløb kan læse din puls fra Helbred og vise den neutralt under en tur — kun hvis du vælger det."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Stjerneløb kan gemme dine ture som workouts i Helbred — kun hvis du vælger det."
        INFOPLIST_KEY_NSCameraUsageDescription: "Stjerneløb bruger kameraet, hvis du vil tage et billede fra din tur."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Stjerneløb bruger dine billeder, hvis du vil knytte et foto til en tur."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Stjerneløb kan dele din position med en betroet voksen mens du løber — kun hvis du selv slår det til. Den slukkes, når turen slutter."

  StjernelobWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: StjernelobWatch
    dependencies:
      - package: StjernelobCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_CFBundleDisplayName: Stjerneløb

  StjernelobShared:
    type: framework
    platform: iOS
    sources:
      - path: StjernelobShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob.shared

  StjernelobWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: StjernelobWidget
    dependencies:
      - target: StjernelobShared
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StjernelobWidget/Info.plist

schemes:
  Stjernelob:
    build:
      targets:
        Stjernelob: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
  StjernelobWatch:
    build:
      targets:
        StjernelobWatch: all
    run:
      config: Debug
