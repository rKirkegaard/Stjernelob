# XcodeGen-definition af Stjerneløb. Selve .xcodeproj genereres herfra (på CI
# eller en Mac med `xcodegen generate`) — så projektet kan redigeres som tekst
# fra Windows og bygges på macOS.
name: Stjernelob

options:
  bundleIdPrefix: com.rkirkegaard.stjernelob
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: da

packages:
  StjernelobCore:
    path: ../StjernelobCore

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Alle targets får en genereret Info.plist (widgetten overrider med sin egen).
    GENERATE_INFOPLIST_FILE: YES
    # Version sættes på alle targets — ellers mangler den indlejrede widget en
    # CFBundleVersion, og appen kan ikke installeres.
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    # Hæves til "complete" senere; holdes på standard under opbygningen.
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Stjernelob:
    type: application
    platform: iOS
    sources:
      - path: Stjernelob
    dependencies:
      - package: StjernelobCore
      - target: StjernelobShared
        embed: true
      - target: StjernelobWidget
        embed: true
    # iCloud (privat CloudKit-synk af SwiftData) + App Group (delt lagring til
    # widget'en). Container-id'erne forudsætter en Apple Developer-konto; CI
    # bygger koden, men selve synk/deling kører først på et signeret device.
    entitlements:
      path: Stjernelob/Stjernelob.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers: [iCloud.com.rkirkegaard.stjernelob]
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.security.application-groups: [group.com.rkirkegaard.stjernelob]
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        # Baggrund: signaltoner skal kunne høres med låst skærm (intervallyd),
        # GPS-distancen skal blive ved med at måle ved låst skærm under turen, og
        # remote-notification lader CloudKit synke i baggrunden.
        INFOPLIST_KEY_UIBackgroundModes: audio location remote-notification
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Stjerneløb kan læse din puls fra Helbred og vise den neutralt under en tur — kun hvis du vælger det."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Stjerneløb kan gemme dine ture som workouts i Helbred — kun hvis du vælger det."
        INFOPLIST_KEY_NSCameraUsageDescription: "Stjerneløb bruger kameraet, hvis du vil tage et billede fra din tur."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Stjerneløb bruger dine billeder, hvis du vil knytte et foto til en tur."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Stjerneløb bruger din position til at måle distance og rute under en tur, og kan dele den med en betroet voksen, hvis du selv slår det til. Den slukkes, når turen slutter."
        INFOPLIST_KEY_NSMotionUsageDescription: "Stjerneløb bruger bevægelsessensoren til at måle distance, når GPS ikke er tilgængelig (fx på løbebånd)."

  StjernelobWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: StjernelobWatch
    dependencies:
      - package: StjernelobCore
    # HealthKit (workout-session) + lokation/bevægelse, så uret kan køre en tur
    # selvstændigt og måle distance. workout-processing holder turen i live, mens
    # skærmen er slukket. Kræver konto/signering for at virke på et device.
    info:
      path: StjernelobWatch/Info.plist
      properties:
        WKApplication: true
        CFBundleDisplayName: Stjerneløb
        WKBackgroundModes: [workout-processing]
        NSHealthShareUsageDescription: "Stjerneløb bruger en træningssession, så din tur kan køre med skærmen slukket — kun mens du løber."
        NSHealthUpdateUsageDescription: "Stjerneløb kan gemme din tur som en træning, hvis du vælger det."
        NSLocationWhenInUseUsageDescription: "Stjerneløb måler din distance under en tur, hvis du løber uden telefonen. Slukkes, når turen slutter."
        NSMotionUsageDescription: "Stjerneløb bruger bevægelsessensoren til at måle distance, når GPS ikke er tilgængelig."
    entitlements:
      path: StjernelobWatch/StjernelobWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob.watchkitapp

  StjernelobTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StjernelobTests
    dependencies:
      - target: Stjernelob
      - target: StjernelobShared

  StjernelobUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StjernelobUITests
    dependencies:
      - target: Stjernelob

  StjernelobShared:
    type: framework
    platform: iOS
    sources:
      - path: StjernelobShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob.shared

  StjernelobWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: StjernelobWidget
    dependencies:
      - target: StjernelobShared
        embed: false
    # Samme App Group som appen, så widget'en kan læse den delte snapshot.
    entitlements:
      path: StjernelobWidget/StjernelobWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.com.rkirkegaard.stjernelob]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rkirkegaard.stjernelob.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StjernelobWidget/Info.plist

schemes:
  Stjernelob:
    build:
      targets:
        Stjernelob: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - StjernelobTests
        - StjernelobUITests
    archive:
      config: Release
  StjernelobWatch:
    build:
      targets:
        StjernelobWatch: all
    run:
      config: Debug
